<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Villa Leppäranta</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="LataaAloitusSisalto()">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top bg-secondary">
      <a class="navbar-brand" href="#" onclick="SkrollaaOsioon('etusivu');return false;"
        >Villa Leppäranta</a
      >

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNavBar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavBar">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="SkrollaaOsioon('etusivu'); return false;"
              >Etusivu</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="SkrollaaOsioon('varustelu'); return false;"
              >Varustelu</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="SkrollaaOsioon('alue'); return false;"
              >Alue ja luonto</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="SkrollaaOsioon('yhteydenotto'); return false;"
              >Yhteydenotto</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="SkrollaaOsioon('kalenteri'); return false;"
              >Kalenteri</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="col-12 p-0" id="kontentti"></div>

    <!-- UUSI OMINAISUUS -->
    <!-- Ponnahdusikkuna suurelle kuvalle -->
    <div
      class="modal fade"
      id="imageModal"
      tabindex="-1"
      aria-labelledby="imageModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <!-- modal-lg tekee ikkunasta suuren -->
        <div class="modal-content bg-transparent border-0">
          <!-- Läpinäkyvä tausta korostaa kuvaa -->
          <div class="modal-body text-center p-0 position-relative">
            <!-- Sulkupainike kuvan kulmaan -->
            <button
              type="button"
              class="close text-white position-absolute"
              data-dismiss="modal"
              aria-label="Sulje"
              style="
                right: 15px;
                top: 10px;
                z-index: 999;
                font-size: 2rem;
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
              "
            >
              <span aria-hidden="true">&times;</span>
            </button>
            <!-- Tähän dynaaminen suuri kuva pamahtaa -->
            <img
              src=""
              id="modalTargetImage"
              class="img-fluid rounded shadow-lg"
              alt="Suurennettu näkymä"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- UUSI OMINAISUUS LOPPUU -->

    <footer id="footer" class="bg-dark text-white-50 text-center py-5">
      <div class="container">
        <p class="m-0">© Villa Leppäranta | Luonnonrauhaa Parikkalassa</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
