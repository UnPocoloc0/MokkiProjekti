<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Villa Leppäranta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  </head>
  <body onload="LataaAloitusSisalto()">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary sticky-top">
      <a class="navbar-brand" href="#" onclick="VaihdaTeksti(0);return false;">Villa Leppäranta</a>

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" onclick=" VaihdaTeksti(0);return false;" >Etusivu</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="VaihdaTeksti(1);return false;">Varustelu</a>
          </li>
          <li class="nav-item"><a
              class="nav-link"
              href="#" onclick="VaihdaTeksti(2);return false;">Alue ja luonto</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="VaihdaTeksti(3);return false;">Yhteydenotto</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="VaihdaTeksti(4);return false;">Kalenteri</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row">
        <div class="col-12" id="kontentti"></div>
      </div>
    </div>
    

    <script>
      
      var etusivuHTML = `
    <div class="container-fluid p-0 mb-4">
      <div class="bg-light text-center p-5 text-muted border mb-4" style="min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 class="display-4 font-weight-bold">Villa Leppäranta</h1>
        <p class="lead my-3">Luonnonrauhaa Parikkalassa</p>
        <a href="#"class="btn btn-primary btn-lg mt-3" onclick="VaihdaTeksti(3); return false;">Katso vapaat ajat</a>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 text-center">
            <h2 class="mb-3">Tervetuloa viihtymään Simplelejärven rannalle</h2>
            <p class="text-secondary">Villa Leppäranta tarjoaa täydelliset puitteet rentoutumiseen, lomailuun tai etätöihin luonnon keskellä.</p>
          </div>
        </div>
      </div>
    </div> 
    
    `;
      var varusteluHTML = `
      <div class="p-3 bg-light border rounded">
        <h2>Ruutu 2</h2>
        <p>Eri sivujen sisältö tulee tähän</p>
        </div>
    `;
      var alueHTML = `
      <div class="p-3 bg-light border rounded">
        <h2>Ruutu 3</h2>
        <p>Eri sivujen sisältö tulee tähän</p>
        </div>
    `;
      var yhteydenottoHTML = `
      <div class="p-3 bg-light border rounded">
        <h2>Ruutu 4</h2>
        <p>Eri sivujen sisältö tulee tähän</p>
        </div>
    `;
      var kalenteriHTML = `
      <div class="p-3 bg-light border rounded">
        <h2>Ruutu 5</h2>
        <p>Eri sivujen sisältö tulee tähän</p>
        </div>
    `;
      function LataaAloitusSisalto() {
        document.getElementById("kontentti").innerHTML = etusivuHTML;
      }

      const sisallot = [etusivuHTML, varusteluHTML, alueHTML, yhteydenottoHTML, kalenteriHTML];

      function VaihdaTeksti(numero) {
        console.log(numero);
        document.getElementById("kontentti").innerHTML = sisallot[numero];
      }
    </script>
  </body>
</html>
